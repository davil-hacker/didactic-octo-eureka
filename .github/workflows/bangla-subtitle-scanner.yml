name: Bangla Subtitle M3U Scanner

on:
  # ম্যানুয়ালি রান করার জন্য
  workflow_dispatch:
    inputs:
      force_full_scan:
        description: 'Force full scan'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  
  # প্রতি 6 ঘণ্টা পর পর অটো রান
  schedule:
    - cron: '0 */6 * * *'  # প্রতি 6 ঘণ্টায় (ইউটিসি)
    # - cron: '0 2,8,14,20 * * *'  # অথবা নির্দিষ্ট সময়ে: রাত ৮টা, সকাল ২টা, সকাল ৮টা, বিকাল ২টা
    
  # কোড পুশ করলেও রান হবে
  push:
    branches: [ main, master ]
    paths:
      - 'scripts/**'
      - 'run.py'
      - 'requirements.txt'
  
  # প্রতিদিন রাত ২টায় (বাংলাদেশ সময়)
  # নোট: GitHub UTC সময় ব্যবহার করে, বাংলাদেশ UTC+6
  # তাই রাত ২টা বাংলাদেশ -> UTC 20:00 (আগের দিন)
  # schedule:
  #   - cron: '20 20 * * *'  # বাংলাদেশ সময় রাত ২টায় (UTC 20:00)

jobs:
  scan-and-update:
    runs-on: ubuntu-latest
    
    # টাইমআউট (ম্যাক্স ৬ ঘণ্টা)
    timeout-minutes: 360
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create necessary directories
      run: |
        mkdir -p playlists
        mkdir -p logs
        mkdir -p temp
        mkdir -p .cache
    
    - name: Run main scanner
      env:
        # যদি কোনো API কী বা সিক্রেট দরকার হয়
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # কাস্টম সিক্রেটস (যদি থাকে)
        # CUSTOM_API_KEY: ${{ secrets.CUSTOM_API_KEY }}
      run: |
        python run.py --github-actions
    
    - name: Check if playlists were created
      id: check_files
      run: |
        if [ -d "playlists" ] && [ "$(ls -A playlists)" ]; then
          echo "playlists_created=true" >> $GITHUB_OUTPUT
          echo "✅ Playlists created successfully"
        else
          echo "playlists_created=false" >> $GITHUB_OUTPUT
          echo "⚠️ No playlists were created"
        fi
    
    - name: List generated playlists
      if: steps.check_files.outputs.playlists_created == 'true'
      run: |
        echo "📁 Generated playlists structure:"
        tree playlists/ || find playlists -type f
    
    - name: Upload playlists as artifact
      uses: actions/upload-artifact@v4
      with:
        name: bangla-subtitle-playlists
        path: |
          playlists/
          logs/scanner.log
        retention-days: 7
        compression-level: 6
    
    - name: Upload to GitHub Release (optional)
      if: github.event_name == 'schedule' || github.event.inputs.force_full_scan == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: daily-playlist-${{ github.run_number }}
        name: "Daily Playlist Update #${{ github.run_number }}"
        body: |
          ### 🎬 Bangla Subtitle Playlists
          - 📅 Updated: `${{ github.event.head_commit.timestamp }}`
          - 🔢 Run Number: `${{ github.run_number }}`
          - ✅ Status: Success
          
          Download the attached `playlists.zip` for all M3U files.
        files: |
          playlists/
        generate_release_notes: true
        prerelease: false
      continue-on-error: true
    
    - name: Send notification to Telegram (optional)
      if: always() && secrets.TELEGRAM_BOT_TOKEN != ''
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          📺 Bangla Subtitle Scanner
          
          🟢 Status: ${{ job.status }}
          🔢 Run: #${{ github.run_number }}
          📅 Time: ${{ github.event.head_commit.timestamp }}
          📁 Playlists: ${{ steps.check_files.outputs.playlists_created }}
          
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    
    - name: Save scan metadata
      run: |
        cat > playlists/metadata.json << EOF
        {
          "last_scan": "$(date -Iseconds)",
          "run_number": ${{ github.run_number }},
          "commit_sha": "${{ github.sha }}",
          "event": "${{ github.event_name }}",
          "status": "${{ job.status }}"
        }
        EOF
    
    - name: Commit and push changes (if needed)
      if: steps.check_files.outputs.playlists_created == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add playlists/ logs/
        git diff --staged --quiet || git commit -m "Automated update: Playlists for run #${{ github.run_number }}"
        git push || echo "No changes to push or push failed"
      continue-on-error: true

  # সতর্কতা: যদি আগের জব ফেইল করে
  notify-failure:
    runs-on: ubuntu-latest
    needs: scan-and-update
    if: failure()
    steps:
      - name: Send failure notification
        uses: actions/github-script@v7
        with:
          script: |
            const message = `❌ **Bangla Subtitle Scanner Failed**
            - Run: #${context.runId}
            - Time: ${new Date().toISOString()}
            - Commit: ${context.sha}
            
            Check: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            console.log(message);
